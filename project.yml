name: KeyLaunch
options:
  minimumXcodeGenVersion: 2.38.0
  createIntermediateGroups: true
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.kevinxft.keylaunch
    MACOSX_DEPLOYMENT_TARGET: 13.0
    SWIFT_VERSION: 5.9
    MARKETING_VERSION: 1.1
    CURRENT_PROJECT_VERSION: 7
targets:
  AppLauncher:
    type: application
    platform: macOS
    sources:
      - path: Sources/AppLauncher
      - path: Resources
    settings:
      base:
        PRODUCT_NAME: KeyLaunch
        INFOPLIST_FILE: Sources/AppLauncher/Info.plist
    scheme:
      testTargets: []
